body:
  text: 淨地淨身觀佛金剛起阿閦􅁤􅁤寶生􅞣􅑈無量壽不空成就金剛持證定􅞣􅞣􅞣􅑉遍觀金剛掌金剛縛開心入智堅固智普賢三昧耶極喜三昧耶降三世蓮花三昧耶法輪大慾大樂金剛􅞣召罪􅞣􅞻擢罪􅞣􅞣淨三業􅞣菩提心􅑈􅑈普禮􅞣通達心證菩提心明顯八葉蓮花觀身本尊􅞣諸如來加持􅞣四如來三昧耶􅁥􅑉􅁥􅁥􅁥五佛灌頂􅞣􅝪􅑉四如來鬘􅑈金剛拍現智身見智身如來平等三昧耶八功德水須彌山小金剛輪啟請􅞥􅍕開門啟請伽陀曰􅞩􅑈􅁤􅁥􅑈􅁤佛海會東􅞣􅞻􅞻􅑈􅚼􅝑􅝑􅝩􅊶􅚼􅑈􅋎西􅚼􅝩北􅞣􅝩􅝴􅝯􅝩􅛊􅑈內口供養外四供養四攝已上羯磨會五佛四波羅蜜十六尊􅁤􅛔􅞣􅝑􅞣八供養􅞣四攝遍照尊􅞣金剛薩埵􅞣金剛寶􅚰􅑈金剛法􅞣金剛業􅞣心上金剛縛東􅞣􅞣􅝩右脇􅞣􅞤􅝪左脇􅞣􅝩要後􅞣􅞤額上南􅞣􅑈心上􅞣􅝯頂上􅞣口上咲處􅞣口上密語西􅞣右耳􅞣􅟛左耳􅞣􅞣􅞣頂後􅞣頂上北􅞣右肩上􅞣右跨上􅞣置心上􅞣散外四􅞣燒香􅞣燈􅞣塗香􅞣三昧耶􅞣􅑈戲嬉􅞣薩埵三昧􅞣羯磨三昧􅞣達磨三昧􅞣􅝪寶幢三昧􅞣香身契􅞣羯磨􅞣鬪勝精進契􅞣􅝩三摩地􅞣遍照尊􅞣勝上三摩地􅞣合指爪􅞣金剛拳􅞣三昧耶􅞣法印􅞣􅑈羯磨印􅞣金剛三昧􅞣􅞣􅝝􅞣蓮華部三昧􅞣􅞣􅞣􅇜旋轉真言奉送􅞣􅚼􅛈寶印􅞣􅝪􅑈􅝝略念誦行道及草草時念誦法先護身自器世間至被甲次結小金剛輪印真言誦之次結根本印誦根本真言加持四處次金剛合掌置頂上誦字二十一遍是供養法也次結根本印念誦根本真言二十一遍以下不必捻珠數自茲以後隨宜行耳寫本云永長二秊四月二十七日奉寫了僧賢尊請來之內以般若寺僧正手筆之本書之
